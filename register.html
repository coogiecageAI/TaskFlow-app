<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - TaskFlow</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-shell { width: 100%; max-width: 560px; }
    .auth-card { background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border-radius: 18px; padding: 36px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-header h1 { font-size: clamp(2rem, 4vw, 2.5rem); margin-bottom: 10px; color: #212529; }
    .auth-header p { color: #6c757d; margin: 0; }
    .password-wrap { position: relative; }
    .toggle-password { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); background: none; border: none; color: #667eea; font-weight: 600; cursor: pointer; padding: 4px 6px; }
    .password-rules { margin-top: 10px; padding: 14px 16px; border-radius: 12px; background: #f8f9fa; border: 1px solid #e9ecef; font-size: 0.92rem; }
    .password-rules ul { margin: 8px 0 0 18px; padding: 0; color: #6c757d; }
    .auth-footer { text-align: center; margin-top: 20px; color: #6c757d; }
    .auth-footer a { color: #667eea; font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .loading-row { display: none; align-items: center; gap: 12px; justify-content: center; margin-bottom: 18px; color: #6c757d; }
    .loading-row.active { display: flex; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card card fade-in">
      <div class="auth-header">
        <h1>Create Your Account</h1>
        <p>Start organizing your tasks today.</p>
      </div>

      <div id="loadingRow" class="loading-row" aria-live="polite">
        <div class="spinner"></div>
        <span>Creating your account...</span>
      </div>

      <div id="successAlert" class="alert alert-success hidden" role="alert"></div>
      <div id="errorAlert" class="alert alert-error hidden" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-input" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" required autocomplete="email" />
          <small style="color:#6c757d; display:block; margin-top:8px;">This will be your username for signing in.</small>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" class="form-input" required autocomplete="new-password" />
            <button type="button" class="toggle-password" data-target="password">Show</button>
          </div>
          <div class="password-rules">
            <strong>Password must contain:</strong>
            <ul>
              <li>At least 8 characters</li>
              <li>One uppercase letter</li>
              <li>One number</li>
              <li>One special character (!@#$%^&*)</li>
            </ul>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" class="form-input" required autocomplete="new-password" />
            <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const loadingRow = document.getElementById('loadingRow');
    const successAlert = document.getElementById('successAlert');
    const errorAlert = document.getElementById('errorAlert');

    function showAlert(type, message) {
      successAlert.classList.add('hidden');
      errorAlert.classList.add('hidden');
      const el = type === 'success' ? successAlert : errorAlert;
      el.textContent = message;
      el.classList.remove('hidden');
    }

    function setLoading(isLoading) {
      loadingRow.classList.toggle('active', isLoading);
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Creating Account...' : 'Create Account';
    }

    function validatePassword(password) {
      return password.length >= 8 && /[A-Z]/.test(password) && /\d/.test(password) && /[!@#$%^&*]/.test(password);
    }

    function getClient() {
      return window.taskflowSupabase || null;
    }

    document.querySelectorAll('.toggle-password').forEach((button) => {
      button.addEventListener('click', () => {
        const target = document.getElementById(button.dataset.target);
        const isPassword = target.type === 'password';
        target.type = isPassword ? 'text' : 'password';
        button.textContent = isPassword ? 'Hide' : 'Show';
      });
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      successAlert.classList.add('hidden');
      errorAlert.classList.add('hidden');

      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!fullName || !email || !password || !confirmPassword) {
        showAlert('error', 'Please complete all fields.');
        return;
      }

      if (!validatePassword(password)) {
        showAlert('error', 'Password must be at least 8 characters long and include an uppercase letter, a number, and a special character.');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('error', 'Passwords do not match.');
        return;
      }

      const client = getClient();
      if (!client) {
        showAlert('error', 'Supabase is not initialized. Update config.js with your real Project URL and anon public key from Supabase Settings > API.');
        return;
      }

      setLoading(true);

      try {
        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: {
            data: { fullname: fullName }
          }
        });

        if (error) throw error;

        form.reset();

        if (data.user && data.session) {
          showAlert('success', 'Account created successfully. Redirecting to your dashboard...');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1200);
        } else {
          showAlert('success', 'Account created. Please check your email to confirm your registration before signing in.');
        }
      } catch (error) {
        showAlert('error', error.message || 'Unable to create your account. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
