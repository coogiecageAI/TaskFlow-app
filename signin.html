<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - TaskFlow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #212529;
        }

        .auth-header p {
            color: #6c757d;
        }

        .form-footer {
            text-align: center;
            margin-top: 30px;
            color: #6c757d;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        #message {
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #6c757d;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e9ecef;
        }

        .divider span {
            padding: 0 15px;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container fade-in">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your tasks</p>
            </div>

            <div id="message"></div>
            <div id="loading">
                <div class="spinner" style="margin: 0 auto;"></div>
                <p>Signing you in...</p>
            </div>

            <form id="signinForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="you@example.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            Show
                        </button>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="color: #667eea; text-decoration: none; font-size: 0.9rem;">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Sign In
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <a href="index.html" class="btn btn-secondary btn-full">
                Back to Home
            </a>

            <div class="form-footer">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Toggle password visibility
        function togglePassword() {
            const field = document.getElementById('password');
            const button = field.nextElementSibling;

            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = 'Hide';
            } else {
                field.type = 'password';
                button.textContent = 'Show';
            }
        }

        // Show message
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
        }

        // Check for email verification in URL
        async function checkEmailVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const type = urlParams.get('type');

            // Handle email verification callback
            if (token || type === 'signup') {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('signinForm').style.display = 'none';

                try {
                    // Supabase automatically handles the token from the URL hash
                    const { data, error } = await supabase.auth.getSession();

                    if (error) throw error;

                    if (data.session) {
                        // User is verified and signed in
                        showMessage('Email verified successfully! Redirecting to dashboard...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    } else {
                        // Verification complete but not signed in
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('signinForm').style.display = 'block';
                        showMessage('Email verified! Please sign in with your credentials.', 'success');
                        // Clean URL
                        window.history.replaceState({}, document.title, 'signin.html');
                    }
                } catch (error) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('signinForm').style.display = 'block';
                    showMessage('Verification complete. Please sign in.', 'info');
                    // Clean URL
                    window.history.replaceState({}, document.title, 'signin.html');
                }
            }
        }

        // Check if user is already signed in
        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }

        // Form submission
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('signinForm').style.display = 'none';

            try {
                // Sign in with Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Success - redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('signinForm').style.display = 'block';

                if (error.message.includes('Email not confirmed')) {
                    showMessage('Please verify your email address before signing in. Check your inbox for the verification link.', 'error');
                } else if (error.message.includes('Invalid login credentials')) {
                    showMessage('Invalid email or password. Please try again.', 'error');
                } else {
                    showMessage(error.message, 'error');
                }
            }
        });

        // Initialize
        checkEmailVerification();
        checkExistingSession();
    </script>
</body>
</html>
